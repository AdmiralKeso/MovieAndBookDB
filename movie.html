<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>

<div class="container-fluid">

    <a href="/" class="back-button">← Back to Movies</a>

    <!-- LOADING -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading movie details...</p>
    </div>

    <div id="errorMessage" class="error-message" style="display:none;"></div>

    <!-- MOVIE DETAILS -->
    <div id="movieDetailsContainer" style="display:none;">

        <div class="movie-details-container">

            <div class="movie-header">

                <div class="movie-poster-section">
                    <img id="moviePoster"
                         class="movie-poster-large"
                         src=""
                         alt="Movie Poster"
                         onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
                </div>

                <div class="movie-content">
                    <h1 class="movie-title-detail" id="movieTitle"></h1>

                    <div class="movie-meta">
                        <div class="meta-item">
                            <div class="meta-label">Release Date</div>
                            <div class="meta-value" id="releaseDate"></div>
                        </div>

                        <div class="meta-item">
                            <div class="meta-label">Rating</div>
                            <div class="meta-value">⭐ <span id="rating"></span></div>
                        </div>

                        <div class="meta-item">
                            <div class="meta-label">Runtime</div>
                            <div class="meta-value" id="runtime"></div>
                        </div>

                        <div class="meta-item">
                            <div class="meta-label">Budget</div>
                            <div class="meta-value" id="budget"></div>
                        </div>
                    </div>

                    <div class="meta-item">
                        <div class="meta-label">Genres</div>
                        <div class="genres" id="genresContainer"></div>
                    </div>

                    <div class="meta-item" style="margin-top: 15px;">
                        <div class="meta-label">Revenue</div>
                        <div class="meta-value" id="revenue"></div>
                    </div>

                </div>
            </div>

            <div class="movie-body">

                <h2 class="section-title">Overview</h2>
                <p class="overview-text" id="overview"></p>

                <h2 class="section-title">Additional Information</h2>

                <div class="two-column">
                    <div>
                        <div class="meta-label">Status</div>
                        <div class="meta-value" id="status"></div>
                    </div>

                    <div>
                        <div class="meta-label">Language</div>
                        <div class="meta-value" id="language"></div>
                    </div>

                    <div>
                        <div class="meta-label">Production</div>
                        <div class="meta-value" id="productionCompanies"></div>
                    </div>

                    <div>
                        <div class="meta-label">Popularity</div>
                        <div class="meta-value" id="popularity"></div>
                    </div>
                </div>

            </div>

            <!-- 📚 RELATED BOOKS -->
            <div id="booksSection" style="margin-top:40px;">

                <h2 class="section-title">Related Books</h2>

                <div id="booksLoading" class="loading">
                    <div class="spinner"></div>
                </div>

                <div id="relatedBooksGrid"></div>

                <div id="noBooks" style="display:none;">
                    No books found
                </div>

            </div>

        </div>
    </div>

</div>

<script type="module" src="assets/scripts/app.js"></script>

</body>
</html>
